<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/dashboard" class="brand-link" (click)="closeMenu()">🏪 PNEU.MA POS</a>
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="menuOpen">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="navbar-links" [class.open]="menuOpen">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">🏠 Accueil</a>
    <a routerLink="/sales" routerLinkActive="active" (click)="closeMenu()">🏷️ Ventes</a>
    <a routerLink="/suppliers" routerLinkActive="active" (click)="closeMenu()">🏢 Fournisseurs</a>
    <a routerLink="/sales-reps" routerLinkActive="active" (click)="closeMenu()">👤 Commerciaux</a>
    <a routerLink="/carriers" routerLinkActive="active" (click)="closeMenu()">🚚 Transporteurs</a>
    <a routerLink="/partners" routerLinkActive="active" (click)="closeMenu()">🤝 Partenaires</a>
    <a routerLink="/cash-flow" routerLinkActive="active" (click)="closeMenu()">💰 Cash Flow</a>
  </div>

  <div class="navbar-user">
    <span class="user-name" *ngIf="userName()">{{ userName() }}</span>
    <button class="btn-logout" (click)="logout()">Déconnexion</button>
  </div>
</nav>
