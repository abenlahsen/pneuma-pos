<form (ngSubmit)="onSubmit()" #form="ngForm" class="p-6">
  <div class="row">
    <div class="col-md-6 mb-4">
      <div class="form-group">
        <label>Date de l'achat</label>
        <input type="date" class="form-control" [(ngModel)]="formData.date" name="date" required>
      </div>
    </div>
    <div class="col-md-6 mb-4">
      <div class="form-group">
        <label>Produit / Pneus</label>
        <input type="text" class="form-control" [(ngModel)]="formData.product" name="product" placeholder="ex: 225/40R18 BRIDGESTONE..." required>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-4">
      <div class="form-group">
        <label>Fournisseur</label>
        <select class="form-control" [(ngModel)]="formData.supplier_id" name="supplier_id" required>
          <option [value]="0" disabled>Sélectionner un fournisseur...</option>
          <option *ngFor="let sup of suppliers()" [value]="sup.id">{{ sup.name }}</option>
        </select>
      </div>
    </div>
    <div class="col-md-6 mb-4">
      <div class="form-group">
        <label>Commercial (Optionnel)</label>
        <select class="form-control" [(ngModel)]="formData.commercial_id" name="commercial_id">
          <option [ngValue]="null">Général / Aucun</option>
          <option *ngFor="let comm of commercials()" [value]="comm.id">{{ comm.name }} ({{ comm.role }})</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4">
      <div class="form-group">
        <label>Quantité</label>
        <input type="number" class="form-control" [(ngModel)]="formData.quantity" name="quantity" min="1" required>
      </div>
    </div>
    <div class="col-md-4 mb-4">
      <div class="form-group">
        <label>PU Achat (DH)</label>
        <input type="number" class="form-control" [(ngModel)]="formData.unit_price" name="unit_price" min="0" step="0.01" required>
      </div>
    </div>
    <div class="col-md-4 mb-4">
      <div class="form-group">
        <label>Total (DH)</label>
        <input type="text" class="form-control" [value]="(formData.quantity * formData.unit_price) | number:'1.2-2'" readonly style="background: #f7fafc; font-weight: 600;">
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4">
      <div class="form-group">
        <label>Statut de Paiement</label>
        <select class="form-control" [(ngModel)]="formData.payment_status" name="payment_status" required>
          <option value="NON PAYE">Non payé</option>
          <option value="PARTIEL">Partiel</option>
          <option value="PAYE">Payé</option>
        </select>
      </div>
    </div>
    <div class="col-md-4 mb-4" *ngIf="formData.payment_status !== 'NON PAYE'">
      <div class="form-group">
        <label>Mode de Paiement</label>
        <select class="form-control" [(ngModel)]="formData.payment_method" name="payment_method">
          <option [ngValue]="null">Sélectionner...</option>
          <option value="Espèces">Espèces</option>
          <option value="Virement">Virement</option>
          <option value="Chèque">Chèque</option>
        </select>
      </div>
      <small class="text-muted" *ngIf="formData.payment_status === 'PAYE' && formData.payment_method === 'Espèces'">
        ⚡ Une dépense sera automatiquement ajoutée à la trésorerie (cash uniquement).
      </small>
    </div>
    <div class="col-md-4 mb-4" *ngIf="formData.payment_status !== 'NON PAYE'">
      <div class="form-group">
        <label>Date de Paiement</label>
        <input type="date" class="form-control" [(ngModel)]="formData.payment_date" name="payment_date">
      </div>
    </div>
  </div>

  <div class="form-actions mt-4 text-right">
    <button type="button" class="btn btn-secondary mr-2" (click)="cancel.emit()" [disabled]="loading()">Annuler</button>
    <button type="submit" class="btn btn-primary" [disabled]="loading()">
      {{ loading() ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
  </div>
</form>
