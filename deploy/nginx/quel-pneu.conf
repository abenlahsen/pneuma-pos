# Nginx virtual host for www.quel-pneu.ma
# This is the HTTP-only version — Certbot will add SSL automatically

server {
    listen 80;
    listen [::]:80;
    server_name quel-pneu.ma www.quel-pneu.ma;

    # Laravel backend root
    root /var/www/quel-pneu.ma/back/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size (for file uploads in the app)
    client_max_body_size 20M;

    # --------------------------------------------------
    # API & Sanctum routes → Laravel (PHP-FPM)
    # --------------------------------------------------
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # --------------------------------------------------
    # Angular SPA → static files
    # --------------------------------------------------
    location / {
        # Serve Angular compiled files
        root /var/www/quel-pneu.ma/front-dist;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/quel-pneu.ma/front-dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }
}
