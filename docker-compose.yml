services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./back:/var/www
    depends_on:
      - php
      - angular
    networks:
      - pneuma-net

  php:
    build:
      context: ./back
      dockerfile: Dockerfile
    volumes:
      - ./back:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pneuma-net

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pneuma_pos}
      MYSQL_USER: ${MYSQL_USER:-pneuma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pneuma-net

  angular:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "${ANGULAR_PORT:-4200}:4200"
    volumes:
      - ./front:/app
      - front-node-modules:/app/node_modules
    networks:
      - pneuma-net

volumes:
  mysql-data:
  front-node-modules:

networks:
  pneuma-net:
    driver: bridge

