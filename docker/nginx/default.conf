server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;
    resolver 127.0.0.11 valid=30s;
    # API requests -> Laravel via PHP-FPM
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # Sanctum CSRF cookie
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # PHP files
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    # Angular dev server (all non-API routes)
    location / {
        set $angular_upstream http://angular:4200;
        proxy_pass $angular_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Angular HMR websocket
    location /ng-cli-ws {
        set $angular_ws_upstream http://angular:4200;
        proxy_pass $angular_ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ~ /\.ht {
        deny all;
    }
}
